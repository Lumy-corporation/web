<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumy Corp - Recrutement</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --lumy-cyan: #00f2ff;
            --lumy-purple: #b400ff;
            --lumy-blue-start: #00dbde; /* Le bleu de ton image */
            --lumy-blue-end: #0056ff;   /* Le bleu de ton image */
            --bg-dark: #0a0a0c;
            --bento-bg: rgba(20, 20, 25, 0.6);
            --bento-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #151520 0%, #0a0a0c 100%);
        }

        /* Conteneur principal */
        .form-container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: var(--bento-bg);
            border: 1px solid var(--bento-border);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        .header-form {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-form i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--lumy-cyan), var(--lumy-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron';
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
        }

        p {
            opacity: 0.6;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* Styles du Formulaire */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--lumy-cyan);
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--bento-border);
            border-radius: 10px;
            color: white;
            font-family: 'Inter';
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--lumy-cyan);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        /* Style spécial pour le champ du poste (Lecture seule) */
        #champ-poste {
            background: linear-gradient(90deg, rgba(0, 219, 222, 0.1), rgba(0, 86, 255, 0.1));
            border-color: var(--lumy-blue-start);
            font-weight: bold;
            color: var(--lumy-blue-start);
            cursor: not-allowed;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--lumy-blue-start), var(--lumy-blue-end));
            color: white;
            font-family: 'Orbitron';
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 86, 255, 0.4);
            filter: brightness(1.2);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.5;
            transition: 0.3s;
        }

        .back-link:hover {
            opacity: 1;
            color: var(--lumy-cyan);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header-form">
            <i class="fas fa-file-signature"></i>
            <h1>Candidature Lumy Corp</h1>
            <p>Rejoignez l'élite technologique de demain.</p>
        </div>

        <form id="recrutement-form">
            <div class="input-group">
                <label>Poste sélectionné</label>
                <input type="text" id="champ-poste" name="poste" readonly value="Chargement...">
            </div>

            <div class="input-group">
                <label>Nom Complet</label>
                <input type="text" name="nom" placeholder="Ex: Théo Rabillard" required>
            </div>

            <div class="input-group">
                <label>Adresse E-mail</label>
                <input type="email" name="email" placeholder="votre@email.com" required>
            </div>

            <div class="input-group">
                <label>Pourquoi vous ? (Motivation)</label>
                <textarea name="motivation" rows="4" placeholder="Décrivez votre expérience ou votre passion pour AuraOS..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Envoyer le dossier</button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour aux pôles</a>
    </div>

    <script>
        // SCRIPT POUR RÉCUPÉRER LE POSTE AUTOMATIQUEMENT
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const posteSelectionne = urlParams.get('poste');

            if (posteSelectionne) {
                // On remplace les underscores par des espaces
                const nomNettoye = posteSelectionne.replace(/_/g, ' ');
                document.getElementById('champ-poste').value = nomNettoye;
            } else {
                document.getElementById('champ-poste').value = "Candidature Libre";
            }
        };

        // Empêcher l'envoi pour l'instant (on verra le traitement plus tard)
        document.getElementById('recrutement-form').onsubmit = function(e) {
            e.preventDefault();
            alert("Dossier envoyé à Lumy Corporation ! (Simulation)");
        };
    </script>

</body>
</html>
